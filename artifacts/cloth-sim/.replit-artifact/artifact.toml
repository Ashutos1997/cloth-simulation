kind = "web"
previewPath = "/"
title = "Cloth Simulation"
version = "1.0.0"
id = "artifacts/cloth-sim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19831

[services.development]
run = "pnpm --filter @workspace/cloth-sim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cloth-sim", "run", "build" ]
publicDir = "artifacts/cloth-sim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19831"
BASE_PATH = "/"
